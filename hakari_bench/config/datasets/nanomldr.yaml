  category: natural_language
  short_description: Compact multilingual long-document retrieval benchmark.
  description: NanoMLDR is a compact version of the MLDR multilingual long-document retrieval
    benchmark. It evaluates retrieval of long documents across 13 languages using question-document
    pairs from the MLDR task.
