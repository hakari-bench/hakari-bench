  short_description: Compact English BEIR retrieval benchmark.
  description: NanoBEIR-en is a compact English benchmark derived from BEIR retrieval datasets.
    It keeps the query-corpus-qrels retrieval format while using small task splits for fast,
    repeatable evaluation.
