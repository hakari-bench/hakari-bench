metadata:
  language: en
  category: natural_language
  short_description: Nano subset of the LongEmbed long-context retrieval benchmark.
  description: NanoLongEmbed evaluates long-context retrieval with compact subsets of LongEmbed
    tasks. It includes real-world long-document QA and summarization retrieval tasks plus
    synthetic passkey and needle retrieval settings.
  citation_keys:
