  multi_long_doc_th:
    language: th
    category: natural_language
    short_description: MultiLongDocRetrieval retrieval split.
    description: 'Multi Long Doc Retrieval (MLDR) ''is curated by the multilingual
      articles from Wikipedia, Wudao and mC4 (see Table 7), and NarrativeQA (Kocˇisky
      ́ et al., 2018; Gu ̈nther et al., 2023), which is only for English.'' (Chen
      et al., 2024). It is constructed by sampling lengthy articles from Wikipedia,
      Wudao and mC4 datasets and randomly choose paragraphs from them. Then we use
      GPT-3.5 to generate questions based on these paragraphs. The generated question
      and the sampled article constitute a new text pair to the dataset. Source dataset:
      mteb/MultiLongDocRetrieval; source subset: th; eval split: dev.'
    source_task: MultiLongDocRetrieval
    source_dataset_id: mteb/MultiLongDocRetrieval
