metadata:
  language: en
  category: natural_language
  short_description: Nano subset of the BRIGHT reasoning-intensive retrieval benchmark.
  description: NanoBRIGHT is a compact subset of BRIGHT for evaluating reasoning-intensive
    retrieval. It covers StackExchange, programming, mathematical reasoning, theorem, and
    long-document variants where queries must retrieve cited or semantically corresponding
    documents.
  citation_keys:
  - su2024bright
  references:
  - title: 'BRIGHT: A Realistic and Challenging Benchmark for Reasoning-Intensive Retrieval'
    authors:
    - Hongjin Su
    - Howard Yen
    - Mengzhou Xia
    - Weijia Shi
    - Niklas Muennighoff
    - Han-yu Wang
    - Haisu Liu
    - Quan Shi
    - Zachary S. Siegel
