metadata:
  language: en
  category: natural_language
  short_description: Reasoning-driven medical retrieval benchmark group.
  description: NanoR2MED is a compact version of R2MED, evaluating reasoning-driven medical
    retrieval across biomedical article domains, medical exam and diagnosis queries, PMC treatment
    and clinical corpora, and IIYi clinical cases.
  citation_keys:
  - li2025r2med
  references:
  - title: 'R2MED: A Benchmark for Reasoning-Driven Medical Retrieval'
    authors:
    - Lei Li
    - Xiao Zhou
    - Zheng Liu
    year: 2025
    url: https://arxiv.org/abs/2505.14558
