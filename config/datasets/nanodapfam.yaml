metadata:
  language: en
  category: natural_language
  short_description: Nano subset of patent-family retrieval tasks.
  description: NanoDAPFAM evaluates patent-family retrieval with query and corpus variants based on titles,
    abstracts, claims, and full text.
  citation_keys: &dapfam_citation_keys
  - ayaou2025dapfam
  references: &dapfam_references
  - title: 'DAPFAM: A Domain-Aware Family-level Dataset to benchmark cross domain patent retrieval'
    authors:
    - Iliass Ayaou
    - Denis Cavallucci
    - Hicham Chibane
    year: 2025
    url: https://arxiv.org/abs/2506.22141
    is_paper: true
    source_confidence: definitive_paper_link
    doi: 10.48550/arXiv.2506.22141
  bibtex: &dapfam_bibtex |
