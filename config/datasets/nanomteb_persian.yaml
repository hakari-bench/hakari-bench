metadata:
  language: fa
  category: natural_language
  short_description: Persian NanoMTEB retrieval benchmark aligned with FaMTEB.
  description: NanoMTEB-Persian is a compact Persian retrieval benchmark aligned with FaMTEB and MTEB-style retrieval tasks, covering translated BEIR-style datasets, Persian web retrieval, NeuCLIR, WebFAQ, and synthetic Persian QA/chatbot retrieval.
