metadata:
  language: zh
  category: natural_language
  short_description: Chinese Nano retrieval benchmark based on C-MTEB retrieval tasks.
  description: NanoMTEB-Chinese is a compact Chinese retrieval benchmark assembled from C-MTEB
    retrieval tasks. It spans web passage ranking, translated MS MARCO-style search,
    Baidu search passages, COVID-19 news, medical consultation QA, e-commerce product
    retrieval, and video title retrieval.
