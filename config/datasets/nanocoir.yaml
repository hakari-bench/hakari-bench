metadata:
  language: en
  category: natural_language
  short_description: NanoCoIR retrieval benchmark group.
  description: NanoCoIR is a Nano-style information retrieval benchmark group. It
    evaluates embedding and retrieval models by ranking corpus documents for each
    query using compact task splits designed for fast, repeatable benchmarking.
  citation_keys:
  - li2024coir
  references:
  - title: 'CoIR: A Comprehensive Benchmark for Code Information Retrieval Models'
    authors:
    - CoIR authors
    year: 2024
    url: https://arxiv.org/abs/2407.02883
  bibtex: "@misc{li2024coir,\n  title = {CoIR: A Comprehensive Benchmark for Code\
    \ Information Retrieval Models},\n  year = {2024},\n  url = {https://arxiv.org/abs/2407.02883}\n\
    }\n"
