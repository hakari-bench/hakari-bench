metadata:
  language: multilingual
  category: natural_language
  short_description: Multilingual Nano retrieval benchmark based on MMTEB tasks.
  description: NanoMMTEB is a compact retrieval benchmark drawn from MMTEB task families.
    It mixes multilingual QA retrieval, English and Danish retrieval tasks, legal and scientific
    retrieval, instruction-following retrieval, reasoning-as-retrieval, long-context retrieval,
    and one code-oriented Stack Overflow QA task.
  citation_keys:
  - mmteb
  references:
  - title: 'MMTEB: Massive Multilingual Text Embedding Benchmark'
    authors:
    - Kenneth Enevoldsen
    - Isaac Chung
    - Imene Kerboua
    - Marton Kardos
    - Ashwin Mathur
    year: 2025
    url: https://arxiv.org/abs/2502.13595
    doi: 10.48550/arXiv.2502.13595
  bibtex: "@article{enevoldsen2025mmteb,\n  title = {MMTEB: Massive Multilingual Text Embedding\
    \ Benchmark},\n  author = {Enevoldsen, Kenneth and Chung, Isaac and Kerboua, Imene and\
    \ Kardos, Marton and Mathur, Ashwin},\n  year = {2025},\n  url = {https://arxiv.org/abs/2502.13595}\n\
    }\n"
