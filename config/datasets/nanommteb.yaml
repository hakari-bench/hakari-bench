metadata:
  language: multilingual
  category: natural_language
  short_description: Multilingual Nano retrieval benchmark based on MMTEB tasks.
  description: NanoMMTEB is a compact retrieval benchmark drawn from MMTEB task families.
    It mixes multilingual QA retrieval, English and Danish retrieval tasks, legal
    and scientific retrieval, instruction-following retrieval, reasoning-as-retrieval,
    long-context retrieval, and one code-oriented Stack Overflow QA task.
  citation_keys:
  - enevoldsen2025mmteb
  references:
  - title: 'MMTEB: Massive Multilingual Text Embedding Benchmark'
    authors:
    - Kenneth Enevoldsen
    - Isaac Chung
    - Imene Kerboua
    - Marton Kardos
    - Ashwin Mathur
    year: 2025
    url: https://proceedings.iclr.cc/paper_files/paper/2025/hash/fc0e3f908a2116ba529ad0a1530a3675-Abstract-Conference.html
    is_paper: true
    source_confidence: definitive_paper_link
  bibtex: "@inproceedings{enevoldsen2025mmteb,\n  title = {MMTEB: Massive Multilingual\
    \ Text Embedding Benchmark},\n  author = {Enevoldsen, Kenneth and Chung, Isaac\
    \ and Kerboua, Imene and Kardos, Marton and Mathur, Ashwin},\n  booktitle = {International\
    \ Conference on Learning Representations},\n  year = {2025},\n  url = {https://proceedings.iclr.cc/paper_files/paper/2025/hash/fc0e3f908a2116ba529ad0a1530a3675-Abstract-Conference.html}\n\
    }\n"
