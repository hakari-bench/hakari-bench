metadata:
  language: en
  category: code
  short_description: Nano subset of CodeRAG-Bench code retrieval tasks.
  description: NanoCodeRAG evaluates retrieval for code retrieval-augmented generation. Its
    compact task splits cover programming solutions, online tutorials, library documentation,
    and Stack Overflow posts.
