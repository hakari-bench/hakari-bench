task_metadata:
  argu_ana_vn:
    language: vi
    category: natural_language
    short_description: ArguAna-VN retrieval split.
    description: 'A translated dataset from NFCorpus: A Full-Text Learning to Rank
      Dataset for Medical Information Retrieval The process of creating the VN-MTEB
      (Vietnamese Massive Text Embedding Benchmark) from English samples involves
      a new automated system: - The system uses large language models (LLMs), specifically
      Coherence''s Aya model, for translation. - Applies advanced embedding models
      to filter the translations. - Use LLM-as-a-judge to scoring the quality of the
      samples base on multiple criteria. Source dataset: GreenNode/arguana-vn; source
      subset: default; eval split: test.'
    source_task: ArguAna-VN
    source_dataset_id: GreenNode/arguana-vn
