  lawir_ko:
    language: ko
    category: natural_language
    short_description: LawIRKo retrieval split.
    description: 'This dataset assesses a model''s ability to retrieve relevant legal
      articles from queries referencing specific Korean laws and provisions. The corpus
      comprises official legal texts including statutes, acts, and regulations, with
      each document representing a single article. Queries are derived from law titles
      paired and article identifiers. For instance the law title might be "건축법" (Building
      Act) and the article name "기술적 기준" (Technical Standards), which would become
      "건축법에 명시된 법률 중에 ''기술적 기준''에 대해 설명하고 있는 세부 항목은 무엇입니까?" ("Which specific articles
      in the Building Act explain the ''technical standards''?"). Source dataset:
      on-and-on/lawgov_ir-ko; source subset: default; eval split: test.'
    source_task: LawIRKo
    source_dataset_id: on-and-on/lawgov_ir-ko
    source_dataset_revision: bd5361e486ef4be7052c506adfdf0610d04abbfe
    source_dataset_subset: default
    source_eval_split: test
    source_nano_split: lawir-ko
