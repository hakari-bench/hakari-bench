metadata:
  language: ko
  category: natural_language
  short_description: Korean NanoMTEB retrieval benchmark.
  description: NanoMTEB-Korean is a compact Korean retrieval benchmark aligned with
    MTEB-style Korean retrieval tasks, covering RAG, implicit-reasoning QA, legal
    article retrieval, and Korean SQuAD-style QA retrieval.
  citation_keys:
  - muennighoff2023mteb
  references:
  - title: 'MTEB: Massive Text Embedding Benchmark'
    authors:
    - Niklas Muennighoff
    - Nouamane Tazi
    - Loic Magne
    - Nils Reimers
    year: 2023
    url: https://aclanthology.org/2023.eacl-main.148/
    is_paper: true
    source_confidence: definitive_paper_link
    doi: 10.18653/v1/2023.eacl-main.148
  bibtex: "@inproceedings{muennighoff2023mteb,\n  title = {{MTEB}: Massive Text Embedding\
    \ Benchmark},\n  author = {Muennighoff, Niklas and Tazi, Nouamane and Magne, Loic\
    \ and Reimers, Nils},\n  booktitle = {Proceedings of the 17th Conference of the\
    \ European Chapter of the Association for Computational Linguistics},\n  pages\
    \ = {2014--2037},\n  year = {2023},\n  url = {https://aclanthology.org/2023.eacl-main.148/},\n\
    \  doi = {10.18653/v1/2023.eacl-main.148}\n}\n"
