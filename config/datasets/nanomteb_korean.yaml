  NanoAutoRAG:
    language: ko
    category: natural_language
    short_description: Korean RAG retrieval over public-domain documents.
    description: NanoAutoRAG evaluates retrieval for Korean RAG benchmark queries
      across finance, public-sector, healthcare, legal, and commerce documents. It
      is a compact Nano split of the AutoRAG retrieval benchmark source used in MTEB.
    citation_keys:
    - kim2024autorag
    references:
