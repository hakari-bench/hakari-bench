metadata:
  language: multilingual
  category: natural_language
  short_description: Medical and public-health retrieval benchmark group.
  description: NanoMedical groups compact medical, biomedical, public-health, and clinical
    retrieval tasks. It covers clinical query-passage retrieval, biomedical literature search,
    scientific claim evidence retrieval, public-health FAQ answer retrieval, and Chinese medical
    answer selection.
