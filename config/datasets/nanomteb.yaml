  NanoFEVERHardNegatives:
    language: en
    category: natural_language
    short_description: FEVER evidence retrieval with hard negatives.
    description: A NanoMTEB hard-negative variant of FEVER. The task keeps the claim-to-Wikipedia-evidence
      framing while emphasizing difficult non-relevant candidates near the gold evidence.
      This split is the compact NanoFEVERHardNegatives subset used by NanoMTEB.
