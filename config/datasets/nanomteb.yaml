  NanoArguAna:
    language: en
    category: natural_language
    short_description: Argument retrieval over counterargument pairs.
    description: A compact ArguAna split where each query is an argument and relevant
      documents are strong counterarguments. It tests whether retrieval models capture
      argumentative stance and semantic opposition beyond lexical overlap. This split
      is the compact NanoArguAna subset used by NanoMTEB.
    citation_keys:
    - wachsmuth2018arguana
    references:
    - title: Retrieval of the Best Counterargument without Prior Topic Knowledge
