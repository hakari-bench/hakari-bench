metadata:
  language: en
  category: natural_language
  short_description: Compact MTEB English retrieval benchmark.
  description: NanoMTEB is a compact English retrieval benchmark aligned with the
    MTEB retrieval evaluation suite. It combines small BEIR-style and hard-negative
    retrieval splits for efficient embedding-model comparison.
  citation_keys:
  - muennighoff2023mteb
  references:
