metadata:
  language: en
  category: natural_language
  short_description: NanoMTEB retrieval benchmark group.
  description: NanoMTEB is a Nano-style information retrieval benchmark group. It
    evaluates embedding and retrieval models by ranking corpus documents for each
    query using compact task splits designed for fast, repeatable benchmarking.
  citation_keys:
  - muennighoff2023mteb
  references:
  - title: 'MTEB: Massive Text Embedding Benchmark'
    authors:
    - Niklas Muennighoff
    - Nouamane Tazi
    - Loic Magne
    - Nils Reimers
    year: 2023
    url: https://arxiv.org/abs/2210.07316
    doi: 10.48550/arXiv.2210.07316
  bibtex: "@inproceedings{muennighoff2023mteb,\n  title = {MTEB: Massive Text Embedding\
    \ Benchmark},\n  author = {Muennighoff, Niklas and Tazi, Nouamane and Magne, Loic\
    \ and Reimers, Nils},\n  year = {2023}\n}\n"
