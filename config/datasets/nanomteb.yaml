  NanoClimateFEVERHardNegatives:
    language: en
    category: natural_language
    short_description: Climate claim retrieval with hard negatives.
    description: A NanoMTEB hard-negative variant of Climate-FEVER. Queries are climate
      claims, and models must rank supporting or refuting evidence above semantically
      close but non-relevant candidates. This split is the compact NanoClimateFEVERHardNegatives
      subset used by NanoMTEB.
