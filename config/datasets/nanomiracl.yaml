metadata:
  language: multilingual
  category: natural_language
  short_description: Compact multilingual MIRACL retrieval benchmark.
  description: NanoMIRACL is a compact multilingual benchmark derived from MIRACL.
    Each language split evaluates monolingual retrieval of Wikipedia passages for
    natural-language questions.
