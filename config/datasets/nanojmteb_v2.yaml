    language: ja
    category: natural_language
    short_description: JaCWIRRetrieval retrieval split.
    description: 'JaCWIR is a small-scale Japanese information retrieval evaluation
      dataset consisting of 5000 question texts and approximately 500k web page titles
      and web page introductions or summaries (meta descriptions, etc.). The question
      texts are created based on one of the 500k web pages, and that data is used
      as a positive example for the question text. Source dataset: mteb/JaCWIRRetrieval;
      source subset: default; eval split: test.'
    source_task: JaCWIRRetrieval
    source_dataset_id: mteb/JaCWIRRetrieval
