  mintaka_ja:
    language: ja
    category: natural_language
    short_description: MintakaRetrieval retrieval split.
    description: 'We introduce Mintaka, a complex, natural, and multilingual dataset
      designed for experimenting with end-to-end question-answering models. Mintaka
      is composed of 20,000 question-answer pairs collected in English, annotated
      with Wikidata entities, and translated into Arabic, French, German, Hindi, Italian,
      Japanese, Portuguese, and Spanish for a total of 180,000 samples. Mintaka includes
      8 types of complex questions, including superlative, intersection, and multi-hop
      questions, which were naturally elicited from crowd workers.  Source dataset:
      mteb/MintakaRetrieval; source subset: ja; eval split: test.'
    source_task: MintakaRetrieval
    source_dataset_id: mteb/MintakaRetrieval
