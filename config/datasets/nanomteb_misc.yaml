  cocite_ru:
    language: ru
    category: natural_language
    short_description: RuSciBenchCociteRetrieval retrieval split.
    description: 'This task focuses on Co-citation Prediction for scientific papers
      from eLibrary, Russia''s largest electronic library of scientific publications.
      Given a query paper (title and abstract), the goal is to retrieve other papers
      that are co-cited with it. Two papers are considered co-cited if they are both
      cited by at least 5 of the same other papers. Similar to the Direct Citation
      task, this task employs a retrieval setup: for a given query paper, all other
      papers in the corpus that are not co-cited with it are considered negative examples.
      The task is available for both Russian and English scientific texts. Source
      dataset: mlsa-iai-msu-lab/ru_sci_bench_cocite_retrieval; source subset: ru;
      eval split: test.'
    source_task: RuSciBenchCociteRetrieval
    source_dataset_id: mlsa-iai-msu-lab/ru_sci_bench_cocite_retrieval
