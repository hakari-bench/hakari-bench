  cite_ru:
    language: ru
    category: natural_language
    short_description: RuSciBenchCiteRetrieval retrieval split.
    description: 'This task is focused on Direct Citation Prediction for scientific
      papers from eLibrary, Russia''s largest electronic library of scientific publications.
      Given a query paper (title and abstract), the goal is to retrieve papers that
      are directly cited by it from a larger corpus of papers. The dataset for this
      task consists of 3,000 query papers, 15,000 relevant (cited) papers, and 75,000
      irrelevant papers. The task is available for both Russian and English scientific
      texts. Source dataset: mlsa-iai-msu-lab/ru_sci_bench_cite_retrieval; source
      subset: ru; eval split: test.'
    source_task: RuSciBenchCiteRetrieval
