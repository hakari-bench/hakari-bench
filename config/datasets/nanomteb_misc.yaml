metadata:
  language: multilingual
  category: natural_language
  short_description: Miscellaneous NanoMTEB-family retrieval tasks.
  description: NanoMTEB-Misc groups compact retrieval tasks that are part of the broader NanoMTEB family but do not belong to a specific official language MTEB benchmark family. It includes multilingual, cross-lingual, translated, and separate benchmark-family retrieval sources such as EuroPIRQ, IndicQA, MuPLeR, NeuCLIR, WMT, BEIR-PL, BEIR-NL, RuSciBench, and other non-family tasks.
  citation_keys:
  - muennighoff2023mteb
  references:
  - title: 'MTEB: Massive Text Embedding Benchmark'
    authors:
    - Niklas Muennighoff
    - Nouamane Tazi
