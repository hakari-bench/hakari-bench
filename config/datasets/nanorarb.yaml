metadata:
  language: en
  category: natural_language
  short_description: Nano subset of the RAR-b reasoning-as-retrieval benchmark.
  description: NanoRARb converts reasoning benchmarks into retrieval tasks, evaluating whether
    retrievers can rank the correct answer or solution for commonsense, temporal, math, and
    code reasoning queries.
  citation_keys:
  - xiao2024rarb
  references:
