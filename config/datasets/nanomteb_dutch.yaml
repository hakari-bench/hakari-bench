  language: multilingual
  category: natural_language
  short_description: Dutch NanoMTEB retrieval benchmark.
  description: NanoMTEB-Dutch is a compact Dutch retrieval benchmark containing the
    MTEB-NL retrieval-family splits. BEIR-NL-only splits are placed in NanoMTEB-Misc.
