metadata:
  language: ja
  category: natural_language
  short_description: NanoJMTEB retrieval benchmark group.
  description: NanoJMTEB is a Nano-style information retrieval benchmark group. It
    evaluates embedding and retrieval models by ranking corpus documents for each
    query using compact task splits designed for fast, repeatable benchmarking.
  citation_keys:
  - li2025jmteb
  references:
  - title: 'JMTEB and JMTEB-lite: Japanese Massive Text Embedding Benchmark and Its
      Lightweight Version'
    authors:
