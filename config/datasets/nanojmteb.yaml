metadata:
  language: ja
  category: natural_language
  short_description: Japanese Nano retrieval benchmark based on JMTEB and JMTEB-lite tasks.
  description: NanoJMTEB is a compact Japanese retrieval benchmark assembled from JMTEB and
    JMTEB-lite retrieval tasks. It covers Japanese web search, administrative FAQ matching,
    quiz and entity QA, multilingual Japanese QA retrieval, long-document retrieval, and academic-paper
    field matching.
  citation_keys:
  - jmteb2025
  references:
  - title: 'JMTEB and JMTEB-lite: Japanese Massive Text Embedding Benchmark and Its Lightweight
      Version'
    authors:
    - Shengzhe Li
    - Masaya Ohagi
    - Ryokan Ri
    - Akihiko Fukuchi
    - Tomohide Shibata
