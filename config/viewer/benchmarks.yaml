benchmarks:
  - name: NanoMMTEB
    label: NanoMMTEB
    include_in_overall: true
  - name: NanoRTEB
    label: NanoRTEB
    include_in_overall: true
  - name: MNanoBEIR
    label: MNanoBEIR
    include_in_overall: true
    score_groups:
      - name: task_mean
        label: Task Mean
        group_by: task_name
      - name: lang_mean
        label: Lang Mean
        group_by: dataset_name
  - name: NanoMLDR
    label: NanoMLDR
    include_in_overall: true
  - name: NanoLongEmbed
    label: NanoLongEmbed
    include_in_overall: true
  - name: NanoCoIR
    label: NanoCoIR
    include_in_overall: true
  - name: NanoIFIR
    label: NanoIFIR
    include_in_overall: true
    excluded_tasks:
      # Duplicates FiQA-style tasks in MNanoBEIR/NanoMTEB, so this uploaded copy is excluded from leaderboard calculations.
      - NanoIFIRFiQA
      # Duplicates NFCorpus-style tasks in MNanoBEIR, so this uploaded copy is excluded from leaderboard calculations.
      - NanoIFIRNFCorpus
      # Duplicates SciFact-style tasks in MNanoBEIR, so this uploaded copy is excluded from leaderboard calculations.
      - NanoIFIRScifact
  - name: NanoLaw
    label: NanoLaw
    include_in_overall: true
    excluded_tasks:
      # Duplicates NanoRTEB/NanoAILACasedocs, so this uploaded copy is excluded from leaderboard calculations.
      - NanoAILACasedocs
      # Duplicates NanoRTEB/NanoAILAStatutes and NanoMMTEB/NanoAILAStatutes, so this uploaded copy is excluded from leaderboard calculations.
      - NanoAILAStatutes
      # Duplicates NanoRTEB/NanoLegalSummarization, so this uploaded copy is excluded from leaderboard calculations.
      - NanoLegalSummarization
      # Duplicates NanoMMTEB/NanoLegalBenchCorporateLobbying, so this uploaded copy is excluded from leaderboard calculations.
      - NanoLegalBenchCorporateLobbying
  - name: NanoMedical
    label: NanoMedical
    include_in_overall: true
    excluded_tasks:
      # Duplicates NanoRTEB/NanoCUREv1, so this uploaded copy is excluded from leaderboard calculations.
      - NanoCUREv1
      # Duplicates NFCorpus-style tasks in MNanoBEIR, so this uploaded copy is excluded from leaderboard calculations.
      - NanoNFCorpus
      # Duplicates SciFact-style tasks in MNanoBEIR, so this uploaded copy is excluded from leaderboard calculations.
      - NanoSciFact
  - name: NanoRARb
    label: NanoRARb
    include_in_overall: true
    excluded_tasks:
      # Duplicates NanoMMTEB/NanoWinoGrande, so this uploaded copy is excluded from leaderboard calculations.
      - NanoWinoGrande
      # Duplicates NanoMMTEB/NanoSpartQA, so this uploaded copy is excluded from leaderboard calculations.
      - NanoSpartQA
      # Duplicates NanoMMTEB/NanoTempReasonL1, so this uploaded copy is excluded from leaderboard calculations.
      - NanoTempReasonL1
  - name: NanoBRIGHT
    label: NanoBRIGHT
    include_in_overall: true
  - name: NanoCodeRAG
    label: NanoCodeRAG
    include_in_overall: true
  - name: NanoChemTEB
    label: NanoChemTEB
    include_in_overall: true
  - name: NanoR2MED
    label: NanoR2MED
    include_in_overall: true
  - name: NanoBuiltBench
    label: NanoBuiltBench
    include_in_overall: true
  - name: NanoCMTEB
    label: NanoCMTEB
    include_in_overall: true
  - name: NanoMTEB
    label: NanoMTEB
    include_in_overall: false
  - name: NanoMIRACL
    label: NanoMIRACL
    include_in_overall: false
  - name: NanoMTEB-Japanese
    label: NanoMTEB-Japanese
    include_in_overall: false
