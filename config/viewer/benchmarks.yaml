  - name: NanoMIRACL
    label: NanoMIRACL
    # NanoMIRACL is organized by language split. Some splits can contain
    # secondary detected languages in `languages`, so Language pages should use
    # the split primary language and keep minor primary languages such as Yoruba.
    language_filter_mode: primary_language
    include_in_overall: false
