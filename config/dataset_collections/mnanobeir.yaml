metadata:
  language: en
  category: natural_language
  short_description: MNanoBEIR retrieval benchmark group.
  description: MNanoBEIR is a Nano-style information retrieval benchmark group. It
    evaluates embedding and retrieval models by ranking corpus documents for each
    query using compact task splits designed for fast, repeatable benchmarking.
  citation_keys:
  - thakur2021beir
  references:
  - title: 'BEIR: A Heterogeneous Benchmark for Zero-shot Evaluation of Information
      Retrieval Models'
    authors:
    - Nandan Thakur
    - Nils Reimers
    - Andreas Rueckle
    - Abhishek Srivastava
    - Iryna Gurevych
    year: 2021
    url: https://arxiv.org/abs/2104.08663
    doi: 10.48550/arXiv.2104.08663
