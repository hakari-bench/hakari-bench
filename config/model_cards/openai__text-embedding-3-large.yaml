id: openai/text-embedding-3-large
display_name: OpenAI text-embedding-3-large
source:
  type: openai
  name: text-embedding-3-large
method: dense
license:
  id: openai-service-terms
  label: OpenAI Service Terms
  type: proprietary
  commercial_use: permitted_with_terms
  source: provider_terms
  source_url: https://openai.com/policies/service-terms/
parameters:
  total:
  active:
embedding:
  dimensions: 3072
  api_dimensions_supported: true
  api_dimension_official_examples:
  - 256
  - 1024
  api_dimension_verified_dims:
  - 256
  - 512
  - 1024
  - 1536
  truncate_method: full_embedding_prefix_l2_normalize
  truncate_dims:
  - 256
  - 512
  - 1024
  - 1536
runtime:
  max_seq_length: 8192
  backend_library: openai
  similarity_fn_name: cosine
language_support:
  category: multilingual
  evidence:
    benchmarks:
    - NanoMIRACL
    - MNanoBEIR
    score_target: all
    classification_policy: model identity first; use broad score evidence only for
      models without explicit language identity
    classification_reason: provider_model_family_is_general_multilingual_embedding_api
    evaluated_language_count: 20
target:
  evaluation_scope: standard
notes:
- "Use `--model-loader openai` and run with `uv run --group openai`."
- "`--truncate-dim` and `embedding.truncate_dims` use full OpenAI embeddings followed by `full[:DIM]` and L2 normalization."
- "OpenAI API `dimensions` is supported by the provider, with official examples for 256 and 1024 dimensions; HAKARI uses normalized-prefix truncation for reusable benchmark variants, which is close to but not bit-identical with API-side `dimensions`."
- "Inputs over 8192 counted tokens are token-truncated by the built-in OpenAI adapter unless `truncate_input_tokens` is disabled in loader kwargs; the provider API hard limit is 8192 tokens per input."
