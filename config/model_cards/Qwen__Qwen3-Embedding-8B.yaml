notes:
- The Hugging Face config has max_position_embeddings 40960 from the Qwen3 base
  architecture, but the Qwen3-Embedding-8B model overview documents 32k as the
  embedding model context length; the model card uses 32768 for evaluation.
- Qwen documents user-defined output dimensions from 32 to 4096 with MRL
  support. HAKARI evaluates sub-full truncation dimensions and keeps the
  4096-dimensional output as the base embedding row.
- Sentence Transformers metadata defines the query prompt name as `query`, the
  document prompt name as `document`, cosine similarity, last-token pooling, and
  output normalization.
