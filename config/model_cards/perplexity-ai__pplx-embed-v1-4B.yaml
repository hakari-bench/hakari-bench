notice: The model supports 32K context, but this evaluation used 8K inference
  because of TEI memory constraints. As a result, long-token tasks that require
  32K context may not reflect the model's full intended performance.
notes:
- The Hugging Face model card documents 2560-dimensional embeddings, 32K
  context, Matryoshka support, INT8/BINARY quantization support, no required
  instruction prompt, and mean pooling.
- The absence of a prompts section is intentional. The model README marks
  Instruction as "No" and says users can embed text directly without choosing
  or maintaining an instruction prefix. When using the example TEI custom
  backend, disable its Qwen3 default prompt names for this model.
- >-
  No official truncation-dimension list is published beyond MRL support and the
  2560-dimensional output. HAKARI evaluates the same sub-full prefix dimensions
  used for other 2560-dimensional MRL embeddings: 2048, 1536, 1024, 768, 512,
  256, 128, 64, and 32.
- TEI v1.9.2+ is required for this model family. On the tested Blackwell
  system, TEI's Pplx1 backend accepted only float32 precision; float16 startup
  failed with "Pplx1 is only supported in fp32 precision."
- TEI 32K warmup failed with CUDA out-of-memory on the tested 96 GiB Blackwell
  GPUs. The reviewed Docker deployment therefore used
  --max-batch-tokens 8192.
