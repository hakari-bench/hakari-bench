- The Hugging Face model card documents QAT support for float32, signed and
  unsigned 8-bit integer, and binary precision outputs. HAKARI dense evaluation
  records int8, binary, and rescore variants separately from this static card.
- >-
  The SentenceTransformers prompt registry defines query as "Represent the query
  for retrieving supporting documents: " and document as "Represent the
  document for retrieval: ". This card uses the query and document prompt names
  so from-model-card evaluation applies the same registry entries.
