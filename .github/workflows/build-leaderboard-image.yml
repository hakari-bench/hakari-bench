name: Build leaderboard image

on:
  workflow_dispatch:
  push:
    branches:
      - hf-space-docker
    paths:
      - .github/workflows/build-leaderboard-image.yml
      - .dockerignore
      - Dockerfile
      - pyproject.toml
      - uv.lock
      - README.md
      - hakari_bench/**
      - config/**
      - task_docs/**

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/hakari-bench/hakari-bench-leaderboard
  IMAGE_TAG: hf-space-docker-latest

jobs:
  validation:
    name: Python tests, lint, and types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Restore tox environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .tox
          key: tox-${{ runner.os }}-py312-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            tox-${{ runner.os }}-py312-

      - name: Run Python tests, lint, and type checks
        run: uv run tox

  build:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest
    needs: validation
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image for smoke test
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=leaderboard-image
          cache-to: type=gha,scope=leaderboard-image,mode=max

      - name: Run viewer import smoke test
        run: |
          docker run --rm -i --entrypoint python "${IMAGE_NAME}:${IMAGE_TAG}" - <<'PY'
          import duckdb
          import fastapi
          import huggingface_hub
          import pydantic
          import yaml
          import uvicorn
          from hakari_bench.viewer.space import create_space_app

          print("viewer imports ok", create_space_app.__name__)
          PY

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        run: |
          docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
